<h3 class="article">제 5 조 (개인정보의 파기 절차 및 방법)</h3>

<p><strong>②</strong> 파기 절차 및 방법은 다음과 같습니다.</p>
<p class="bullet">▸ 전자적 파일 형태 (클라우드 기반 계약 관리 데이터, 예약 일정 데이터): 복구 불가능한 방법으로 영구 삭제</p>
<p class="bullet">▸ CCTV 영상: 저장 매체의 자동 덮어쓰기 방식으로 60일 후 파기</p>
<p class="bullet">▸ 서비스 처리 기록 (운영 로그): 자동화 삭제 시스템이 24시간 초과 데이터를 매일 자동 삭제</p>
<p class="bullet">▸ 보증금 반환 계좌 정보: 반환 완료 확인 즉시 해당 정보 삭제</p>
<p class="bullet">▸ 종이 문서가 있는 경우: 분쇄기 사용 또는 소각</p>

<p><strong>②</strong> 다음의 경우에는 예외적으로 개인정보를 제공할 수 있습니다.</p>
<p class="indent"><strong>1.</strong> 이용자가 사전에 동의한 경우</p>
<p class="indent"><strong>2.</strong> 법령에 의하여 제공이 요구되거나 수사기관이 법령에 정해진 절차와 방법에 따라 요청하는 경우</p>

<h3 class="article">제 8 조 (자동화된 개인정보 처리 시스템 안내)</h3>
<p><strong>①</strong> 회사는 서비스 운영의 효율화와 이용자에 대한 신속한 안내를 위해 자동화 운영 시스템을 운영합니다. 이 시스템은 이용자의 동의 및 계약 이행을 위해 다음과 같이 개인정보를 자동으로 처리합니다.</p>
<h2 class="chapter">▶ 자동화 처리 개요</h2>
<p><strong>①</strong> 예약 연동: 이용자가 예약 플랫폼을 통해 신청한 정보가 관리자 내부 채널을 일시 경유하여</p>
<p>AI 분석 시스템으로 전달되고, 계약 관리 데이터베이스에 자동 저장됩니다.</p>
<p>경유에 사용된 이미지는 분석 완료 즉시 자동 삭제됩니다.</p>
<p><strong>②</strong> 알림 발송: 계약 만료 D-7·D-0, 연체 발생 시 이용자 휴대전화번호로 알림이 자동 발송됩니다.</p>
<p>(발송 대행: Solapi)</p>
<p><strong>③</strong> 이력 관리: 계약이 종료된 건은 별도 보관 공간으로 자동 이관되며, 운영 처리 기록은</p>
<p>24시간 경과 후 자동 삭제됩니다.</p>
<p><strong>②</strong> 자동화 시스템에 의한 처리에 이의가 있거나 사람에 의한 검토를 요청하는 경우 카카오 채널(도심창고_함(HAAM))로 문의하실 수 있습니다.</p>
<p><strong>③</strong> 회사는 이용자에게 중요한 영향을 미치는 결정(계약 해지, 연체 처리 등)에 대해서는 자동화 처리 결과를 담당자가 최종 확인하는 절차를 거칩니다.</p>

<p><strong>④</strong> 권리 행사는 이용자의 법정대리인이나 위임을 받은 자 등 대리인을 통해서도 할 수 있습니다. 이 경우 위임장 등 대리권을 증명하는 서류를 제출하여야 합니다.</p>

<h3 class="article">제 11 조 (개인정보의 안전성 확보 조치)</h3>

<h2 class="chapter">■ 기술적 조치</h2>
<p class="bullet">▸ 클라우드 기반 계약 관리 데이터의 접근 권한을 업무상 필요한 담당자에게만 부여하며, 역할에 따라 열람·편집·관리자 권한을 구분하여 적용</p>
<p class="bullet">▸ 서비스 연동 API 인증 정보는 시스템 환경변수로 별도 분리하여 보관</p>
<p class="bullet">▸ 알림 발송 API에 HMAC 인증 방식 적용으로 보안 강화</p>
<p class="bullet">▸ 동시 처리로 인한 데이터 충돌 방지를 위한 잠금(Lock) 처리 적용</p>
<p class="bullet">▸ 서비스 처리 기록 24시간 자동 삭제로 불필요한 개인정보 최소화</p>

function switchVersion(ver) {
  const container = document.getElementById('privacy-container');
  container.style.animation = 'none';
  container.offsetHeight;
  container.style.animation = 'fadeIn 0.3s ease';
  container.innerHTML = privacyData[ver];

  const sel = document.getElementById('version-select');
  if (sel) sel.value = ver;
  const badge = document.getElementById('current-badge');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}
