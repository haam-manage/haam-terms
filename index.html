<h2 class="chapter">제 1 장&nbsp;&nbsp;총 칙</h2>
<h3 class="article">제 1 조 (목적)</h3>
<p>본 약관은 함(HAAM)(대표자: 이은호, 사업자등록번호: 680-04-03868, 사업장: 서울시 동작구 상도로 60길 2, B1, 이하 "회사")이 제공하는 도심창고:함(HAAM) 서비스(이하 "서비스")를 이용함에 있어 회사와 이용자(이하 "회원") 간의 권리, 의무 및 책임 사항, 기타 필요한 사항을 규정함을 목적으로 합니다.</p>

<p><strong>1.</strong> "서비스"란 회사가 회원에게 제공하는 생활물품 보관, 공간 대여 및 이에 부수하는 제반 서비스를 의미합니다.</p>
<p><strong>2.</strong> "회원"이란 본 약관에 따라 이용계약을 체결하고 회사가 제공하는 서비스를 이용하는 자를 말합니다.</p>
<p><strong>3.</strong> "유닛(Unit)"이란 물품 보관을 위해 회원에게 독점적 사용권이 부여된 개별 수납공간을 의미합니다.</p>
<p><strong>4.</strong> "이용료"란 서비스 이용의 대가로 회원이 회사에 지불하는 금액을 의미합니다.</p>
<p><strong>5.</strong> "보증금"이란 미납 이용료, 유닛 파손 등 회원의 채무를 담보하기 위해 예치하는 금액을 의미합니다.</p>
<p><strong>6.</strong> "지연 점유료"란 계약 기간이 종료된 이후에도 회원이 물품을 반출하지 않고 유닛을 계속 점유함으로써 회사에 발생하는 손해의 배상 금액을 의미합니다.</p>
<p><strong>7.</strong> "정상가"란 이벤트·프로모션 할인이 적용되지 않은 해당 유닛의 월 기준 이용료를 의미합니다.</p>

<p><strong>①</strong> 회사는 본 약관의 내용을 회원이 쉽게 알 수 있도록 카카오 채널(도심창고_함(HAAM)) 및 네이버 예약 페이지에 게시합니다.</p>
<p><strong>②</strong> 회사는 관련 법령을 위배하지 않는 범위에서 본 약관을 개정할 수 있습니다.</p>
<p><strong>③</strong> 약관을 개정할 경우에는 적용일자 및 개정사유를 명시하여 현행 약관과 함께 그 적용일자 7일 전부터(회원에게 불리한 변경의 경우 30일 전) 카카오 채널(도심창고_함(HAAM)) 및 네이버 예약 페이지에 공지합니다.</p>
<h2 class="chapter">제 2 장&nbsp;&nbsp;서비스 이용계약</h2>
<h3 class="article">제 4 조 (이용계약의 성립)</h3>
<p><strong>①</strong> 이용계약은 회원이 본 약관의 내용에 동의한 후 네이버 예약 페이지를 통해 서비스 이용을 신청하고, 회사가 이를 승낙함으로써 성립합니다.</p>

<p><strong>②</strong> 회원이 제1항의 변경사항을 알리지 않아 발생한 통지 누락, 서비스 이용 제한 등의 모든 불익은 회원에게 귀속됩니다.</p>

<p><strong>①</strong> 회원은 계약 체결 시 해당 유닛의 1개월 정상 이용료 상당액을 보증금으로 회사에 예치해야 합니다.</p>
<p class="bullet">▸ 소중:함(M): 70,000원 / 든든:함(L): 120,000원 / 넉넉:함(LX): 200,000원</p>
<p><strong>②</strong> 보증금은 미납 이용료, 지연 점유료, 지연손해금, 시설 파손에 따른 원상복구 비용, 미반출 물품의 이전·폐기 및 행정 처리 비용 등에 우선 충당될 수 있습니다.</p>
<p><strong>③</strong> 보증금은 계약 종료 후 유닛의 원상복구 및 정산이 완료된 후 반환하며, 이자는 지급하지 않습니다.</p>
<h2 class="chapter">제 3 장&nbsp;&nbsp;서비스 이용 및 제한</h2>
<h3 class="article">제 7 조 (서비스 제공 및 이용시간)</h3>
<p><strong>①</strong> 서비스는 연중무휴, 1일 24시간 제공함을 원칙으로 합니다. 다만, 시설 점검이나 보수 등 회사가 필요하다고 판단하는 경우 서비스 이용의 전부 또는 일부를 제한할 수 있습니다.</p>
<p><strong>②</strong> 회사는 보안 관리 및 시설 안전을 위해 QR코드 기반 출입 통제 시스템을 운영하며, 회원은 회사가 정한 출입 절차를 준수해야 합니다.</p>
<p><strong>③</strong> 회원의 QR 출입 권한은 계약 기간 만료 또는 계약 해지 시 자동으로 소멸됩니다.</p>
<h3 class="article">제 8 조 (보관 금지 물품)</h3>

<p><strong>▸ </strong>원고, 설계도면, 소프트웨어, 금형(쇠틀)·목형(나무틀) 등 재생 불가능한 고유 자료</p>
<p class="notice"><em>※ 위 서류는 분실·훼손 시 법적·경제적 가치 산정이 불가합니다. 은행 대여금고 등 전문 보안 서비스를 이용하시기 바랍니다.</em></p>
<p class="group-header"><strong>【제3군: 법령 위반 물품】</strong></p>
<p><strong>▸ </strong>마약류 관리에 관한 법률에 따른 마약, 향정신성의약품, 대마 및 이와 유사한 물질</p>
<p><strong>▸ </strong>총기류, 도검류 및 관련 부품·탄약 (적법한 소지 허가증 보유 여부 불문)</p>
<p><strong>▸ </strong>화약류, 폭발물, 폭발성 장치, 폭죽류</p>
<p><strong>▸ </strong>압류·가압류·가처분 등 법원의 보전처분이 내려진 물품</p>
<p><strong>▸ </strong>장물, 범죄로 취득한 물품, 도난 의심 물품, 소유 권한이 불명확한 물품</p>
<p><strong>▸ </strong>상표권·저작권 등 지식재산권을 침해하는 모조품·위조품</p>
<p><strong>▸ </strong>위조화폐, 위조 공문서, 위조·변조된 유가증권</p>
<p><strong>▸ </strong>방사성 물질, 핵물질 및 관련 기기·장치</p>
<p><strong>▸ </strong>밀수품, 군수품, 부정임산물 등 소지·보관이 허가되지 않은 물품</p>
<p><strong>▸ </strong>관계 법령에 의해 소지·보관·운반이 금지된 일체의 물품</p>
<p class="group-header"><strong>【제4군: 화재·폭발·안전 위험 물품】</strong></p>
<p><strong>▸ </strong>휘발유, 경유, 등유 등 인화성 액체 연료 및 LPG·LNG 가스 실린더</p>
<p><strong>▸ </strong>페인트, 니스, 신나, 아세톤, 알코올 등 인화성 도료·용제류</p>
<p><strong>▸ </strong>오토바이, 스쿠터 등 내연기관 이륜차 (연료 제거 여부 불문)</p>
<p><strong>▸ </strong>전기오토바이, 전동킥보드, 전기자전거 및 이에 준하는 개인형 이동장치(PM) 일체 및 이에 장착·분리된 배터리팩·충전기</p>
<p><strong>▸ </strong>충전용 대용량 리튬이온 배터리팩 (소형 개인용 기기 내장 배터리 제외)</p>
<p><strong>▸ </strong>부탄가스 캔·스프레이 가압 용기류 (3개 이상)</p>
<p><strong>▸ </strong>자연발화·발효·자연발열 가능성이 있는 물질</p>
<p><strong>▸ </strong>연료가 완전히 제거되지 않은 소형 엔진 장착 기기 (잔디깎기, 발전기 등)</p>
<p class="group-header"><strong>【제5군: 생물·위생 위험 물품】</strong></p>
<p><strong>▸ </strong>살아있는 동물, 식물 및 그 사체</p>
<p><strong>▸ </strong>냉장·냉동이 필요한 물품, 부패하기 쉬운 음식물</p>
<p><strong>▸ </strong>악취·유해가스를 방출하거나 타 회원의 물품을 오염시킬 우려가 있는 물품</p>
<p><strong>▸ </strong>감염성 의료 폐기물, 혈액·체액이 묻은 의료용품, 사용 후 주사바늘</p>
<p><strong>②</strong> 회사는 합리적 이유가 있는 경우 금지 물품 보관 여부에 대한 소명을 요구할 수 있으며, 정당한 사유 없이 이를 거부하는 경우 계약을 즉시 해지할 수 있습니다.</p>
<p><strong>③</strong> 금지 물품이 발견된 경우 회사는 즉시 반출을 명하고 계약을 해지할 수 있으며, 기납부 이용료는 반환하지 않습니다.</p>
<p><strong>④</strong> 금지 물품으로 인해 발생한 화재·폭발·오염 등의 손해배상 책임은 원인을 제공한 회원이 부담합니다.</p>
<h3 class="article">제 9 조 (시설 이용 및 행위 제한)</h3>
<p><strong>①</strong> 유닛 내부 공간은 물품의 보관 용도로만 사용해야 하며, 유닛 및 복도·주차장 등 공용 공간에서 다음 각 호의 행위를 엄격히 금지합니다.</p>
<p><strong>1.</strong> 주거·숙박·영업·작업 공간(개인 사무 포함)으로 사용하는 행위</p>
<p><strong>2.</strong> 허가되지 않은 흡연, 음주, 고성방가, 취사 및 소음 유발 행위</p>
<p><strong>3.</strong> 출입 통로·복도·라운지 등 공용 공간에 물품을 폐기·적재·방치하는 행위</p>
<p><strong>4.</strong> 내부 천장 구조물(메쉬망·통풍시설)에 물품을 접촉시키는 행위</p>
<p><strong>5.</strong> 회사의 사전 허가 없이 전열기기·화기·액체류를 시설 내에서 사용하는 행위</p>
<p><strong>6.</strong> 시설 내 CCTV 영상을 무단 녹화·편집·배포하거나 제3자에게 제공하는 행위</p>
<p><strong>7.</strong> 반려동물을 포함한 동물을 시설 내에 동반하는 행위</p>
<p><strong>8.</strong> 시설물 및 건물 공용 공간에 쓰레기·오염물질을 버리는 행위</p>
<p><strong>9.</strong> 회사의 사전 동의 없이 영업 관련 자료(사진·문서 등)를 외부에 유출하거나 상업적으로 이용하는 행위</p>
<p><strong>10.</strong> 자신의 출입 권한(QR코드 등)을 권한 없는 제3자와 공유하거나 대여하는 행위</p>
<p><strong>②</strong> 회원은 복도, 주차장 등 공용 공간의 구조를 임의로 변경하거나 시설물을 훼손해서는 안 됩니다.</p>
<p><strong>③</strong> 비상구·소화기·소화전 주변에 물품을 적치하는 행위를 금지합니다.</p>
<p><strong>④</strong> 이상 징후(화재 냄새·연기·누수 등) 발견 시 즉시 카카오 채널(도심창고_함(HAAM)) 및 119에 신고해야 합니다.</p>
<p><strong>⑤</strong> 본 조 위반 시 회사는 계약을 즉시 해지할 수 있으며, 이로 인한 영업 손실에 대해 손해배상을 청구할 수 있습니다.</p>
<h3 class="article">제 10 조 (유닛의 양도 및 전대 금지)</h3>
<p>회원은 회사의 사전 승낙 없이 서비스 이용 권한이나 유닛의 사용권을 타인에게 양도, 전대하거나 담보로 제공할 수 없습니다.</p>
<h3 class="article">제 10 조의 2 (이용 시 주의사항)</h3>
<p><strong>①</strong> 회원은 보관 물품의 중량·성질에 맞는 적절한 포장을 해야 합니다.</p>
<p><strong>②</strong> <strong> </strong>유닛 1칸에 보관할 수 있는 물품의 총 중량은 200kg을 초과할 수 없습니다.</p>
<p><strong>③</strong> 의류·이불·전자기기 등 습기에 예민한 물품은 반드시 제습제를 동봉하여 보관합니다.</p>
<p><strong>④</strong> <strong> </strong>의류·이불류는 세탁 후 완전히 건조한 상태로 보관합니다.</p>
<p><strong>⑤</strong> <strong> </strong>정수기·세탁기·제습기 등 수분 관련 제품은 완전히 배수·건조한 후 보관합니다.</p>
<p><strong>⑥</strong> <strong> </strong>회원이 보관한 물품으로 유닛 내부가 오염된 경우 즉시 원상복구해야 하며, 시설이 훼손된 경우 카카오 채널(도심창고_함(HAAM))로 즉시 신고하고 발생 손해를 배상해야 합니다.</p>
<p><strong>⑦</strong> <strong> </strong>회사는 보관 물품의 종류 및 상태에 대한 소명을 요구할 수 있으며, 정당한 사유 없이 이를 거부할 경우 서비스 이용을 제한할 수 있습니다.</p>
<h3 class="article">제 10 조의 3 (회사의 유닛 접근 및 긴급조치권)</h3>
<p><strong>①</strong> 회사는 다음 각 호의 경우 회원에게 사전 통지 후 유닛에 접근할 수 있습니다. 단, 긴급한 경우에는 사전 통지 없이 접근한 후 카카오 채널(도심창고_함(HAAM)) 또는 문자메시지로 즉시 통보합니다.</p>
<p><strong>1.</strong> 시설 점검·보수·유지관리가 필요한 경우</p>
<p><strong>2.</strong> 화재·침수·누수·가스 누출 등 재난 상황</p>
<p><strong>3.</strong> 금지 물품 보관 의심 등 합리적 이유가 있는 경우</p>
<p><strong>4.</strong> 이용료 미납으로 계약 해지 절차가 진행 중인 경우</p>
<p><strong>5.</strong> 수사기관의 압수수색 영장 등 법적 명령에 따른 협조가 필요한 경우</p>
<p><strong>②</strong> 회사는 유닛 접근 시 2인 이상이 동행하고 접근 일시·사유를 기록합니다.</p>
<p><strong>③</strong> 시설 및 타 회원의 안전에 중대한 위협이 되는 물품 발견 시 회사는 즉시 처분 후 회원에게 사후 통보할 수 있습니다.</p>
<h2 class="chapter">제 4 장&nbsp;&nbsp;이용료 및 환불</h2>
<h3 class="article">제 11 조 (이용료의 산정 및 지불)</h3>
<p><strong>①</strong> 이용료는 네이버 예약 페이지에 게시된 정상가격을 기준으로 산정하며, 회원은 네이버 예약 시스템을 통해 계약 기간 전체에 대한 이용료를 선불로 결제합니다. 계약 기간은 결제 완료 시 확정됩니다.</p>
<p><strong>②</strong> 계약 기간이 종료된 이후에도 회원이 유닛 내 물품을 반출하지 않는 경우, 회사는 계약 종료일 익일부터 다음의 지연 점유료를 일할 계산하여 청구할 수 있습니다.</p>
<p class="bullet">▸ 소중:함(M): 정상가 70,000원 × 120% ÷ 30일 = 하루 2,800원</p>
<p class="bullet">▸ 든든:함(L): 정상가 120,000원 × 120% ÷ 30일 = 하루 4,800원</p>
<p class="bullet">▸ 넉넉:함(LX): 정상가 200,000원 × 120% ÷ 30일 = 하루 8,000원</p>
<p><strong>③</strong> 지연 점유료는 보증금에서 우선 공제할 수 있으며, 보증금을 초과하는 경우 별도 청구합니다.</p>
<p><strong>④</strong> 이용료(정상가) 변경 시 회사는 변경 적용일 30일 전에 카카오 채널(도심창고_함(HAAM)) 및 네이버 예약 페이지에 사전 공지합니다.</p>
<h3 class="article">제 12 조 (환불 규정 및 서비스 개시의 정의)</h3>
<p><strong>①</strong> "서비스 개시"란 회원이 이용을 위한 출입 권한(QR코드)을 지급받고 해당 시설에 최초로 출입한 시점을 의미합니다.</p>
<p><strong>②</strong> 서비스 개시 전 해지: 해지 요청 시 결제 대금 전액을 환불합니다.</p>
<p><strong>③</strong> 서비스 개시 후 중도 해지: 회원은 중도 해지를 요청할 수 있으며, 환불액은 다음과 같이 산정합니다.</p>
<p><strong>환불액 = [실제 결제 총액] − [이용일수 × 정상가 일할액] − [잔여기간 정상가 × 20%]</strong></p>
<p class="bullet">▸ 정상가 일할액 기준: M: 70,000 ÷ 30일 ≒ 2,333원/일 / L: 120,000 ÷ 30일 = 4,000원/일 / LX: 200,000 ÷ 30일 ≒ 6,667원/일</p>
<p class="bullet">▸ 이용 기간에 따른 일할 요금은 프로모션·할인이 적용되지 않은 해당 시점의 정상가를 기준으로 산정합니다.</p>
<p class="bullet">▸ 해지 위약금: 잔여기간 정상 이용료의 20%</p>
<p class="bullet">▸ 이용 기간이 전체 계약 기간의 80% 이상 경과한 경우에는 환불이 불가합니다.</p>
<p><strong>④</strong> 이벤트·프로모션 등을 통해 제공된 단기 특가 상품이나 "환불 불가" 조건이 사전 고지된 상품은 해당 고지 내용을 본 조에 우선하여 적용합니다.</p>
<p class="notice"><em>※ 중도해지 예시: 소중:함(M) 60일치 선불(140,000원), 40일 이용 후 해지 시 → 140,000 − (2,333×40) − (2,333×20×20%) = 약 37,348원 환불</em></p>
<h2 class="chapter">제 5 장&nbsp;&nbsp;손해배상 및 면책</h2>
<h3 class="article">제 13 조 (손해배상 및 범위)</h3>
<p><strong>①</strong> 회사는 회사의 명백한 귀책 사유로 인하여 보관 물품이 분실 또는 훼손된 경우 회원에게 그 손해를 배상합니다.</p>
<p><strong>②</strong> 배상액은 사고 발생 당시 해당 물품의 구입 가격, 사용 연수 및 마모 정도를 고려하여 산정된 감가상각 반영 중고 시장 가액(이하 "실가")을 기준으로 산정합니다.</p>
<p><strong>③</strong> 모든 손해배상은 회사가 가입한 배상책임보험의 보상 범위 및 보험사의 손해사정 결과에 따라 지급됩니다. 이의가 있는 경우 회원은 제20조에 따라 이의신청을 할 수 있습니다.</p>
<p><strong>④</strong> 회사의 배상 책임은 어떠한 경우에도 해당 유닛에 납부된 보증금의 10배를 초과하지 않습니다.</p>
<p class="bullet">▸ 소중:함(M): 사고당 최대 700,000원</p>
<p class="bullet">▸ 든든:함(L): 사고당 최대 1,200,000원</p>
<p class="bullet">▸ 넉넉:함(LX): 사고당 최대 2,000,000원</p>
<p><strong>⑤</strong> 제4항의 배상 한도를 초과하는 물품(제8조 제1항 제1군 제4호 해당 물품)은 보관이 금지됩니다. 동 금지 물품을 무단으로 보관하여 발생한 손해에 대해 회사는 배상 책임을 지지 않습니다.</p>
<p><strong>⑥</strong> 회원은 물품 반출 시 상태를 즉시 확인해야 하며, 반출 이후 발견된 손해에 대해서는 회사가 책임을 지지 않습니다.</p>
<h3 class="article">제 14 조 (회사의 면책)</h3>
<p>회사는 다음 각 호의 사유로 발생한 손해에 대해서는 배상 책임을 지지 않습니다.</p>
<p><strong>1.</strong> 천재지변, 수해 등 불가항력적인 사유로 인한 손해. 단, 화재의 경우 회사의 귀책 또는 원인 불명으로 발생한 화재에 한하여 회사가 가입한 화재보험의 보상 범위 내에서 배상하며, 회원의 귀책·금지 물품으로 인한 화재는 면책으로 한다.</p>
<p><strong>2.</strong> 물품의 고유한 결함, 자연적 소모, 변질, 부패 또는 쥐·벌레에 의한 피해</p>
<p><strong>3.</strong> 회원의 부주의로 인한 출입 권한(QR코드 등) 유출 또는 관리 소홀로 발생한 사고</p>
<p><strong>4.</strong> 보관 금지 물품(제8조)을 보관하여 발생한 사고 및 이로 인해 발생한 타 회원의 손해</p>
<p><strong>5.</strong> 정부 정책, 법령의 변경 등 회사가 통제할 수 없는 외부 요인에 의한 서비스 중단</p>
<p><strong>6.</strong> 물품의 발효·자연발열·자연발화, 전기기기·장치의 전기적 사고, 파열 또는 폭발</p>
<p><strong>7.</strong> 회원이 계약 유닛 외 공용 공간에 물품을 보관·방치하여 발생한 손해</p>
<p><strong>8.</strong> 전자파·전자장(EMF)으로 인한 물품 손해</p>
<p><strong>9.</strong> 바람·빗물·모래먼지·추위·서리 등 자연환경 유입으로 인한 손해</p>
<p><strong>10.</strong> 시설 설비의 보수·교체·정기점검으로 서비스 이용이 일시 불가한 경우</p>
<p><strong>11.</strong> 제3자의 불법적인 시스템 접속 또는 해킹으로 인한 손해</p>
<p><strong>12.</strong> 회원의 QR코드·출입 권한 유출·공유로 인한 사고</p>
<h2 class="chapter">제 6 장&nbsp;&nbsp;계약 해지 및 물품의 처분</h2>
<h3 class="article">제 15 조 (계약의 해지)</h3>
<p><strong>①</strong> 회원은 언제든지 중도 해지를 요청할 수 있으며, 제12조의 환불 규정에 따라 정산합니다. 단, 제12조 제4항에 따라 환불 불가 조건이 사전 고지된 상품의 경우 해당 고지 내용이 우선 적용됩니다.</p>
<p><strong>②</strong> 회사는 회원이 다음 각 호에 해당할 경우 계약을 해지할 수 있습니다.</p>
<p><strong>1.</strong> 이용료 결제일로부터 30일이 경과하도록 미납이 해소되지 않는 경우</p>
<p><strong>2.</strong> 본 약관의 금지 사항 및 행위 제한 규정을 위반하여 운영에 차질을 주는 경우</p>
<p><strong>3.</strong> 타 회원의 서비스 이용을 방해하거나 위협을 가하는 경우</p>
<p><strong>4.</strong> 제8조의 금지 물품을 보관하는 것이 확인된 경우 (즉시 해지 가능)</p>
<p><strong>5.</strong> 회원이 사망하거나 60일 이상 연락이 두절된 경우</p>
<h3 class="article">제 16 조 (물품의 반출 및 강제 처분)</h3>
<p><strong>①</strong> 계약 기간 만료 또는 계약 해지 즉시 회원의 QR 출입 권한은 자동으로 소멸되며, 회원은 계약 종료일까지 보관 물품을 반출하고 유닛을 원상복구해야 합니다.</p>
<p><strong>②</strong> 계약 종료일 이후에도 물품이 반출되지 않은 경우 회사는 다음 3단계 절차를 이행합니다.</p>
<p><strong>▸ [1단계] 종료일로부터 +7일 이내</strong></p>
<p>카카오 채널(도심창고_함(HAAM)) 또는 문자메시지로 1차 반출 독촉 및 캐비넷 비밀번호 변경 예고 발송</p>
<p><strong>▸ [2단계] 종료일로부터 +21일 이내</strong></p>
<p>처분 예고를 포함한 2차 반출 독촉 발송</p>
<p><strong>▸ [3단계] 종료일로부터 +28일 경과 후</strong></p>
<p>① 물품을 다른 장소로 이전·보관 (이전 비용은 회원 부담)</p>
<p>② 미납 지연 점유료 정산 후 잉여분 회원 반환</p>
<p>③ 물품을 매각·공매·폐기 처분하고 수익을 미납금에 충당, 잔액 반환</p>
<p><strong>③</strong> [캐비넷 비밀번호 변경 — 보안 조치] 회사는 계약 종료 후 회원이 물품을 미반출한 상태에서, 출입 권한을 상실한 해당 회원 또는 제3자가 유닛에 무단 접근하여 미납 지연 점유료 등의 정산 없이 물품을 반출하는 것을 방지하기 위하여, 계약 종료일 익일부터 해당 유닛의 캐비넷 비밀번호를 회사 보안 번호로 변경할 수 있습니다. 이 조치는 캐비넷 내부를 개방·수색·처분하지 않으며 오직 외부 접근 차단을 목적으로 하고, 회원에게 카카오 채널(도심창고_함(HAAM)) 또는 문자메시지로 즉시 통보합니다.</p>
<p><strong>④</strong> [비밀번호 변경 후 물품 접근 절차] 캐비넷 비밀번호가 변경된 이후 회원이 물품 반출을 원하는 경우 다음 절차에 따라 진행합니다.</p>
<p class="step">Step 1. 카카오 채널(도심창고_함(HAAM)) 또는 문자메시지로 반출 의사 통지</p>
<p class="step">Step 2. 회사가 지연 점유료 및 미납금액 확정 후 회원에게 통지</p>
<p class="step">Step 3. 회원이 지정 계좌로 전액 납부</p>
<p class="step">Step 4. 납부 확인 즉시 새 캐비넷 비밀번호 및 임시 QR 접근 권한 부여</p>
<p class="step">Step 5. 회원 반출 완료 후 임시 QR 권한 자동 소멸</p>
<p><strong>⑤</strong> [캐비넷 비밀번호 변경 조치 면책] 회사가 제3항의 보안 조치를 이행하는 과정에서 발생하는 다음 각 호의 손해에 대하여 회사는 책임을 지지 않습니다.</p>
<p><strong>1.</strong> 회원이 캐비넷에 접근하지 못함으로 인해 발생하는 간접 손해 (업무 지장, 배송 지연, 기회 손실 등)</p>
<p><strong>2.</strong> 캐비넷 내 물품의 자연적 노화·변질·습기 손상 (단, 회사가 임의로 캐비넷을 개방하여 발생한 손해는 제외)</p>
<p><strong>3.</strong> 회원이 반출 의사를 표시하지 않아 발생하는 추가 지연 점유료 누적</p>
<p><strong>⑥</strong> 물품 처분 과정에서 발생하는 모든 비용은 보증금에서 우선 공제하며, 부족분은 회원에게 청구합니다.</p>
<p><strong>⑦</strong> 회원은 본 조에 따른 적법한 절차를 거친 회사의 조치에 대하여 손해배상을 청구할 수 없습니다.</p>
<h3 class="article">제 16 조의 2 (이용자의 사망 및 연락 두절)</h3>
<p><strong>①</strong> 회원이 사망한 경우 상속인은 다음 서류를 카카오 채널(도심창고_함(HAAM)) 또는 방문으로 제출하여 이용자 지위를 승계받을 수 있습니다.</p>
<p class="bullet">▸ 가족관계증명서(고인 포함), 사망진단서, 신청인(상속인) 신분증 사본</p>
<p class="bullet">▸ 위임장 및 위임인·수임인 신분증 사본 (대리인 신청 시)</p>
<p><strong>②</strong> 이용자 지위 승계의 효력은 회사가 서류를 확인·승인한 날부터 발생합니다.</p>
<p><strong>③</strong> 사망일로부터 60일 이내에 상속인의 명의변경 신청이 없거나 모든 상속인이 상속을 포기한 경우, 회사는 계약을 해지하고 제16조에 따라 물품을 처분할 수 있습니다.</p>
<p><strong>④</strong> 회원이 60일 이상 연락이 두절된 경우, 회사는 알려진 최후 연락처로 사전 통지 후 제16조의 물품 처분 절차를 준용할 수 있습니다.</p>
<h2 class="chapter">제 7 장&nbsp;&nbsp;광고성 정보</h2>
<h3 class="article">제 17 조 (광고성 정보 제공)</h3>
<p><strong>①</strong> 회사는 수신에 동의한 회원에 한하여 카카오 채널(도심창고_함(HAAM)) 또는 문자메시지로 이벤트·할인 등 광고성 정보를 발송할 수 있습니다.</p>
<p><strong>②</strong> 회원은 언제든지 수신을 거절할 수 있으며, 수신 거절 즉시 회사는 광고성 정보 발송을 중단합니다.</p>
<h2 class="chapter">제 8 장&nbsp;&nbsp;이의신청 및 분쟁해결</h2>
<h3 class="article">제 18 조 (준거법 및 재판관할)</h3>
<p><strong>①</strong> 본 약관의 해석 및 회원과 회사 간의 분쟁에 대해서는 대한민국 법령을 적용합니다.</p>
<p><strong>②</strong> 서비스 이용과 관련하여 분쟁이 발생한 경우, 양 당사자는 카카오 채널(도심창고_함(HAAM))을 통한 상호 협의로 해결을 먼저 시도합니다.</p>
<p><strong>③</strong> 소비자기본법에 따라 분쟁이 발생한 경우 한국소비자원에 분쟁조정을 신청할 수 있습니다.</p>
<p><strong>④</strong> 협의로 해결되지 않는 경우 소송이 제기될 경우, 회사의 본점 소재지를 관할하는 법원을 합의 관할 법원으로 합니다.</p>
<h3 class="article">제 19 조 (CCTV 운영 안내)</h3>
<p><strong>①</strong> 회사는 시설 보안 및 안전 관리를 위해 시설 내 CCTV를 다음과 같이 운영합니다.</p>
<p class="bullet">▸ 설치 수량: 총 5대 (내부 4대, 출입구 1대)</p>
<p class="bullet">▸ 영상 보관기간: 촬영일로부터 30일</p>
<p><strong>②</strong> CCTV 영상은 범죄 수사, 시설 사고 조사 등 법적 목적 외에는 사용하지 않으며, 관련 법령에 따라 보관·관리합니다.</p>
<p><strong>③</strong> CCTV 영상 열람·제공은 수사기관의 공식 요청 또는 법원의 명령이 있는 경우에 한합니다.</p>
<h3 class="article">제 20 조 (이용제한 조치에 대한 이의신청)</h3>
<p><strong>①</strong> 회사의 이용제한 조치에 이의가 있는 회원은 통지를 받은 날로부터 14일 이내에 카카오 채널(도심창고_함(HAAM)), 문자메시지 또는 서면으로 이의신청을 제출할 수 있습니다.</p>
<p><strong>②</strong> 회사는 이의신청 접수일로부터 14일 이내에 답변하며, 이의 사유가 타당한 경우 이에 따른 조치를 취합니다.</p>

<p><strong>①</strong> 회사는 본 약관의 내용을 회원이 쉽게 알 수 있도록 카카오 채널(도심창고_함(HAAM)) 및 네이버 예약 페이지에 게시합니다.</p>
<p><strong>②</strong> 회사는 관련 법령을 위배하지 않는 범위에서 본 약관을 개정할 수 있습니다.</p>
<p><strong>③</strong> 약관을 개정할 경우에는 적용일자 및 개정사유를 명시하여 현행 약관과 함께 그 적용일자 7일 전부터(회원에게 불리한 변경의 경우 30일 전) 카카오 채널(도심창고_함(HAAM)) 및 네이버 예약 페이지에 공지합니다.</p>
<h2 class="chapter">제 2 장&nbsp;&nbsp;서비스 이용계약</h2>
<h3 class="article">제 4 조 (이용계약의 성립)</h3>
<p><strong>①</strong> 이용계약은 회원이 본 약관의 내용에 동의한 후 네이버 예약 페이지를 통해 서비스 이용을 신청하고, 회사가 이를 승낙함으로써 성립합니다.</p>
<p><strong>②</strong> 회사는 다음 각 호에 해당하는 경우 승낙을 유보하거나 거절할 수 있습니다.</p>
<p><strong>1.</strong> 서비스 설비의 여유가 없거나 기술상·업무상 지장이 있는 경우</p>
<p><strong>2.</strong> 미성년자가 법정대리인의 동의 없이 이용을 신청한 경우</p>
<p><strong>3.</strong> 법인 회원이 사업자등록증 등 필수 서류를 제출하지 않은 경우</p>
<p><strong>4.</strong> 기타 회사가 정한 이용 조건을 충족하지 못한 경우</p>
<h3 class="article">제 5 조 (회원정보의 변경)</h3>
<p><strong>①</strong> 회원은 이용 신청 시 기재한 연락처 등 정보가 변경된 경우, 카카오 채널(도심창고_함(HAAM))을 통해 즉시 변경 사항을 회사에 알려야 합니다.</p>
<p><strong>②</strong> 회원이 제1항의 변경사항을 알리지 않아 발생한 통지 누락, 서비스 이용 제한 등의 모든 불익은 회원에게 귀속됩니다.</p>
<h3 class="article">제 6 조 (보증금)</h3>
<p><strong>①</strong> 회원은 계약 체결 시 해당 유닛의 1개월 정상 이용료 상당액을 보증금으로 회사에 예치해야 합니다.</p>
<p class="bullet">▸ 소중:함(M): 70,000원 / 든든:함(L): 120,000원 / 넉넉:함(LX): 200,000원</p>
<p><strong>②</strong> 보증금은 미납 이용료, 지연 점유료, 지연손해금, 시설 파손에 따른 원상복구 비용, 미반출 물품의 이전·폐기 및 행정 처리 비용 등에 우선 충당될 수 있습니다.</p>
<p><strong>③</strong> 보증금은 계약 종료 후 유닛의 원상복구 및 정산이 완료된 후 반환하며, 이자는 지급하지 않습니다.</p>
<h2 class="chapter">제 3 장&nbsp;&nbsp;서비스 이용 및 제한</h2>
<h3 class="article">제 7 조 (서비스 제공 및 이용시간)</h3>
<p><strong>①</strong> 서비스는 연중무휴, 1일 24시간 제공함을 원칙으로 합니다. 다만, 시설 점검이나 보수 등 회사가 필요하다고 판단하는 경우 서비스 이용의 전부 또는 일부를 제한할 수 있습니다.</p>
<p><strong>②</strong> 회사는 보안 관리 및 시설 안전을 위해 QR코드 기반 출입 통제 시스템을 운영하며, 회원은 회사가 정한 출입 절차를 준수해야 합니다.</p>
<p><strong>③</strong> 회원의 QR 출입 권한은 계약 기간 만료 또는 계약 해지 시 자동으로 소멸됩니다.</p>
<h3 class="article">제 8 조 (보관 금지 물품)</h3>
<p><strong>①</strong> 회원은 다음 각 호의 물품을 보관할 수 없습니다. 이를 위반하여 발생한 모든 손해 및 제3자에 대한 배상 책임은 전적으로 해당 회원에게 귀속되며, 회사가 제3자에게 손해를 배상한 경우 해당 회원에게 구상권을 행사할 수 있습니다.</p>
<p class="group-header"><strong>【제1군: 고가 귀중품】</strong></p>
<p><strong>▸ </strong>현금(지폐·동전), 수표, 어음, 주식·채권 등 유가증권, 인지, 우표 및 이와 유사한 것</p>
<p><strong>▸ </strong>금·은·백금 등 귀금속 원재료, 보석류, 고가 장신구</p>
<p><strong>▸ </strong>골동품, 미술품, 조각물, 감정가 산정이 어려운 희귀 수집품</p>
<p><strong>▸ </strong>단일 물품의 취득가 또는 시장가가 다음 금액을 초과하는 고가 물품</p>
<p><strong>‣ </strong>소중:함(M) 이용자: 700,000원 초과 물품</p>
<p><strong>‣ </strong>든든:함(L) 이용자: 1,200,000원 초과 물품</p>
<p><strong>‣ </strong>넉넉:함(LX) 이용자: 2,000,000원 초과 물품</p>
<p class="notice"><em>※ 위 금액은 본 약관 제13조 제4항의 배상 한도와 동일하며, 한도를 초과하는 물품은 회사가 배상할 수 없습니다.</em></p>
<p class="group-header"><strong>【제2군: 중요 원본 서류·증빙】</strong></p>
<p><strong>▸ </strong>부동산 등기권리증, 매매·임대차·분양 계약서 등 부동산 관련 원본 서류</p>
<p><strong>▸ </strong>인감도장 및 인감증명서</p>
<p><strong>▸ </strong>주민등록증, 운전면허증, 여권, 외국인등록증 등 신분증명 서류 원본</p>
<p><strong>▸ </strong>통장·예금증서 원본, 신용카드, 보험증권 원본, 금융계약서 원본</p>
<p><strong>▸ </strong>유언장, 공문서 원본 등 법적 효력을 갖는 원본 서류</p>
<p><strong>▸ </strong>원고, 설계도면, 소프트웨어, 금형(쇠틀)·목형(나무틀) 등 재생 불가능한 고유 자료</p>
<p class="notice"><em>※ 위 서류는 분실·훼손 시 법적·경제적 가치 산정이 불가합니다. 은행 대여금고 등 전문 보안 서비스를 이용하시기 바랍니다.</em></p>
<p class="group-header"><strong>【제3군: 법령 위반 물품】</strong></p>
<p><strong>▸ </strong>마약류 관리에 관한 법률에 따른 마약, 향정신성의약품, 대마 및 이와 유사한 물질</p>
<p><strong>▸ </strong>총기류, 도검류 및 관련 부품·탄약 (적법한 소지 허가증 보유 여부 불문)</p>
<p><strong>▸ </strong>화약류, 폭발물, 폭발성 장치, 폭죽류</p>
<p><strong>▸ </strong>압류·가압류·가처분 등 법원의 보전처분이 내려진 물품</p>
<p><strong>▸ </strong>장물, 범죄로 취득한 물품, 도난 의심 물품, 소유 권한이 불명확한 물품</p>
<p><strong>▸ </strong>상표권·저작권 등 지식재산권을 침해하는 모조품·위조품</p>
<p><strong>▸ </strong>위조화폐, 위조 공문서, 위조·변조된 유가증권</p>
<p><strong>▸ </strong>방사성 물질, 핵물질 및 관련 기기·장치</p>
<p><strong>▸ </strong>밀수품, 군수품, 부정임산물 등 소지·보관이 허가되지 않은 물품</p>
<p><strong>▸ </strong>관계 법령에 의해 소지·보관·운반이 금지된 일체의 물품</p>
<p class="group-header"><strong>【제4군: 화재·폭발·안전 위험 물품】</strong></p>
<p><strong>▸ </strong>휘발유, 경유, 등유 등 인화성 액체 연료 및 LPG·LNG 가스 실린더</p>
<p><strong>▸ </strong>페인트, 니스, 신나, 아세톤, 알코올 등 인화성 도료·용제류</p>
<p><strong>▸ </strong>오토바이, 스쿠터 등 내연기관 이륜차 (연료 제거 여부 불문)</p>
<p><strong>▸ </strong>전기오토바이, 전동킥보드, 전기자전거 및 이에 준하는 개인형 이동장치(PM) 일체 및 이에 장착·분리된 배터리팩·충전기</p>
<p><strong>▸ </strong>충전용 대용량 리튬이온 배터리팩 (소형 개인용 기기 내장 배터리 제외)</p>
<p><strong>▸ </strong>부탄가스 캔·스프레이 가압 용기류 (3개 이상)</p>
<p><strong>▸ </strong>자연발화·발효·자연발열 가능성이 있는 물질</p>
<p><strong>▸ </strong>연료가 완전히 제거되지 않은 소형 엔진 장착 기기 (잔디깎기, 발전기 등)</p>
<p class="group-header"><strong>【제5군: 생물·위생 위험 물품】</strong></p>
<p><strong>▸ </strong>살아있는 동물, 식물 및 그 사체</p>
<p><strong>▸ </strong>냉장·냉동이 필요한 물품, 부패하기 쉬운 음식물</p>
<p><strong>▸ </strong>악취·유해가스를 방출하거나 타 회원의 물품을 오염시킬 우려가 있는 물품</p>
<p><strong>▸ </strong>감염성 의료 폐기물, 혈액·체액이 묻은 의료용품, 사용 후 주사바늘</p>
<p><strong>②</strong> 회사는 합리적 이유가 있는 경우 금지 물품 보관 여부에 대한 소명을 요구할 수 있으며, 정당한 사유 없이 이를 거부하는 경우 계약을 즉시 해지할 수 있습니다.</p>
<p><strong>③</strong> 금지 물품이 발견된 경우 회사는 즉시 반출을 명하고 계약을 해지할 수 있으며, 기납부 이용료는 반환하지 않습니다.</p>
<p><strong>④</strong> 금지 물품으로 인해 발생한 화재·폭발·오염 등의 손해배상 책임은 원인을 제공한 회원이 부담합니다.</p>
<h3 class="article">제 9 조 (시설 이용 및 행위 제한)</h3>
<p><strong>①</strong> 유닛 내부 공간은 물품의 보관 용도로만 사용해야 하며, 유닛 및 복도·주차장 등 공용 공간에서 다음 각 호의 행위를 엄격히 금지합니다.</p>
<p><strong>1.</strong> 주거·숙박·영업·작업 공간(개인 사무 포함)으로 사용하는 행위</p>
<p><strong>2.</strong> 허가되지 않은 흡연, 음주, 고성방가, 취사 및 소음 유발 행위</p>
<p><strong>3.</strong> 출입 통로·복도·라운지 등 공용 공간에 물품을 폐기·적재·방치하는 행위</p>
<p><strong>4.</strong> 내부 천장 구조물(메쉬망·통풍시설)에 물품을 접촉시키는 행위</p>
<p><strong>5.</strong> 회사의 사전 허가 없이 전열기기·화기·액체류를 시설 내에서 사용하는 행위</p>
<p><strong>6.</strong> 시설 내 CCTV 영상을 무단 녹화·편집·배포하거나 제3자에게 제공하는 행위</p>
<p><strong>7.</strong> 반려동물을 포함한 동물을 시설 내에 동반하는 행위</p>
<p><strong>8.</strong> 시설물 및 건물 공용 공간에 쓰레기·오염물질을 버리는 행위</p>
<p><strong>9.</strong> 회사의 사전 동의 없이 영업 관련 자료(사진·문서 등)를 외부에 유출하거나 상업적으로 이용하는 행위</p>
<p><strong>10.</strong> 자신의 출입 권한(QR코드 등)을 제10조의4에 따른 공동사용자 등록 절차를 거치지 않고 제3자와 공유하거나 대여하는 행위</p>
<p><strong>②</strong> 회원은 복도, 주차장 등 공용 공간의 구조를 임의로 변경하거나 시설물을 훼손해서는 안 됩니다.</p>
<p><strong>③</strong> 비상구·소화기·소화전 주변에 물품을 적치하는 행위를 금지합니다.</p>
<p><strong>④</strong> 이상 징후(화재 냄새·연기·누수 등) 발견 시 즉시 카카오 채널(도심창고_함(HAAM)) 및 119에 신고해야 합니다.</p>
<p><strong>⑤</strong> 본 조 위반 시 회사는 계약을 즉시 해지할 수 있으며, 이로 인한 영업 손실에 대해 손해배상을 청구할 수 있습니다.</p>
<h3 class="article">제 10 조 (유닛의 양도 및 전대 금지)</h3>
<p>회원은 회사의 사전 승낙 없이 서비스 이용 권한이나 유닛의 사용권을 타인에게 양도, 전대하거나 담보로 제공할 수 없습니다.</p>
<h3 class="article">제 10 조의 2 (이용 시 주의사항)</h3>
<p><strong>①</strong> 회원은 보관 물품의 중량·성질에 맞는 적절한 포장을 해야 합니다.</p>
<p><strong>②</strong> 유닛 1칸에 보관할 수 있는 물품의 총 중량은 200kg을 초과할 수 없습니다.</p>
<p><strong>③</strong> 의류·이불·전자기기 등 습기에 예민한 물품은 반드시 제습제를 동봉하여 보관합니다.</p>
<p><strong>④</strong> 의류·이불류는 세탁 후 완전히 건조한 상태로 보관합니다.</p>
<p><strong>⑤</strong> 정수기·세탁기·제습기 등 수분 관련 제품은 완전히 배수·건조한 후 보관합니다.</p>
<p><strong>⑥</strong> 회원이 보관한 물품으로 유닛 내부가 오염된 경우 즉시 원상복구해야 하며, 시설이 훼손된 경우 카카오 채널(도심창고_함(HAAM))로 즉시 신고하고 발생 손해를 배상해야 합니다.</p>
<p><strong>⑦</strong> 회사는 보관 물품의 종류 및 상태에 대한 소명을 요구할 수 있으며, 정당한 사유 없이 이를 거부할 경우 서비스 이용을 제한할 수 있습니다.</p>
<h3 class="article">제 10 조의 3 (회사의 유닛 접근 및 긴급조치권)</h3>
<p><strong>①</strong> 회사는 다음 각 호의 경우 회원에게 사전 통지 후 유닛에 접근할 수 있습니다. 단, 긴급한 경우에는 사전 통지 없이 접근한 후 카카오 채널(도심창고_함(HAAM)) 또는 문자메시지로 즉시 통보합니다.</p>
<p><strong>1.</strong> 시설 점검·보수·유지관리가 필요한 경우</p>
<p><strong>2.</strong> 화재·침수·누수·가스 누출 등 재난 상황</p>
<p><strong>3.</strong> 금지 물품 보관 의심 등 합리적 이유가 있는 경우</p>
<p><strong>4.</strong> 이용료 미납으로 계약 해지 절차가 진행 중인 경우</p>
<p><strong>5.</strong> 수사기관의 압수수색 영장 등 법적 명령에 따른 협조가 필요한 경우</p>
<p><strong>②</strong> 회사는 유닛 접근 시 2인 이상이 동행하고 접근 일시·사유를 기록합니다.</p>
<p><strong>③</strong> 시설 및 타 회원의 안전에 중대한 위협이 되는 물품 발견 시 회사는 즉시 처분 후 회원에게 사후 통보할 수 있습니다.</p>
<h3 class="article">제 10 조의 4 (공동사용자 등록 및 관리)</h3>
<p>① 계약자는 다음의 인원 범위 내에서 공동사용자를 등록할 수 있습니다.</p>
<p class="bullet">▸ 소중:함(M): 계약자 포함 총 2인 (공동사용자 최대 1인)</p>
<p class="bullet">▸ 든든:함(L): 계약자 포함 총 3인 (공동사용자 최대 2인)</p>
<p class="bullet">▸ 넉넉:함(LX): 계약자 포함 총 4인 (공동사용자 최대 3인)</p>
<p>② 공동사용자 등록은 계약자가 카카오 채널(도심창고_함(HAAM))을 통해 신청하며, 회사가 본인 확인 정보를 검토한 후 출입 권한을 부여합니다.</p>
<p>③ 공동사용자의 변경은 계약 기간 중 불가합니다. 단, 공동사용자의 사망, 장기 연락 두절 등 불가피한 사유가 있는 경우 회사의 승인 하에 1회에 한하여 변경할 수 있습니다.</p>
<p>④ 공동사용자가 본 약관을 위반한 경우, 그에 따른 모든 책임은 해당 공동사용자를 등록한 계약자에게 귀속됩니다.</p>
<p>⑤ 계약 종료 시 공동사용자의 출입 권한은 계약자의 권한과 동시에 자동으로 소멸됩니다.</p>
<h2 class="chapter">제 4 장&nbsp;&nbsp;이용료 및 환불</h2>
<h3 class="article">제 11 조 (이용료의 산정 및 지불)</h3>
<p><strong>①</strong> 이용료는 네이버 예약 페이지에 게시된 정상가격을 기준으로 산정하며, 회원은 네이버 예약 시스템을 통해 계약 기간 전체에 대한 이용료를 선불로 결제합니다. 계약 기간은 결제 완료 시 확정됩니다.</p>
<p><strong>②</strong> 계약 기간이 종료된 이후에도 회원이 유닛 내 물품을 반출하지 않는 경우, 회사는 계약 종료일 익일부터 다음의 지연 점유료를 일할 계산하여 청구할 수 있습니다.</p>
<p class="bullet">▸ 소중:함(M): 정상가 70,000원 × 120% ÷ 30일 = 하루 2,800원</p>
<p class="bullet">▸ 든든:함(L): 정상가 120,000원 × 120% ÷ 30일 = 하루 4,800원</p>
<p class="bullet">▸ 넉넉:함(LX): 정상가 200,000원 × 120% ÷ 30일 = 하루 8,000원</p>
<p><strong>③</strong> 지연 점유료는 보증금에서 우선 공제할 수 있으며, 보증금을 초과하는 경우 별도 청구합니다.</p>
<p><strong>④</strong> 이용료(정상가) 변경 시 회사는 변경 적용일 30일 전에 카카오 채널(도심창고_함(HAAM)) 및 네이버 예약 페이지에 사전 공지합니다.</p>
<h3 class="article">제 12 조 (환불 규정 및 서비스 개시의 정의)</h3>
<p><strong>①</strong> "서비스 개시"란 회원이 이용을 위한 출입 권한(QR코드)을 지급받고 해당 시설에 최초로 출입한 시점을 의미합니다.</p>
<p><strong>②</strong> 서비스 개시 전 해지: 해지 요청 시 결제 대금 전액을 환불합니다.</p>
<p><strong>③</strong> 서비스 개시 후 중도 해지: 회원은 중도 해지를 요청할 수 있으며, 환불액은 다음과 같이 산정합니다.</p>
<p><strong>환불액 = [실제 결제 총액] − [이용일수 × 정상가 일할액] − [잔여기간 정상가 × 20%]</strong></p>
<p class="bullet">▸ 정상가 일할액 기준: M: 70,000 ÷ 30일 ≒ 2,333원/일 / L: 120,000 ÷ 30일 = 4,000원/일 / LX: 200,000 ÷ 30일 ≒ 6,667원/일</p>
<p class="bullet">▸ 이용 기간에 따른 일할 요금은 프로모션·할인이 적용되지 않은 해당 시점의 정상가를 기준으로 산정합니다.</p>
<p class="bullet">▸ 해지 위약금: 잔여기간 정상 이용료의 20%</p>
<p class="bullet">▸ 이용 기간이 전체 계약 기간의 80% 이상 경과한 경우에는 환불이 불가합니다.</p>
<p><strong>④</strong> 이벤트·프로모션 등을 통해 제공된 단기 특가 상품이나 "환불 불가" 조건이 사전 고지된 상품은 해당 고지 내용을 본 조에 우선하여 적용합니다.</p>
<p class="notice"><em>※ 중도해지 예시: 소중:함(M) 60일치 선불(140,000원), 40일 이용 후 해지 시 → 140,000 − (2,333×40) − (2,333×20×20%) = 약 37,348원 환불</em></p>
<h2 class="chapter">제 5 장&nbsp;&nbsp;손해배상 및 면책</h2>
<h3 class="article">제 13 조 (손해배상 및 범위)</h3>
<p><strong>①</strong> 회사는 회사의 명백한 귀책 사유로 인하여 보관 물품이 분실 또는 훼손된 경우 회원에게 그 손해를 배상합니다.</p>
<p><strong>②</strong> 배상액은 사고 발생 당시 해당 물품의 구입 가격, 사용 연수 및 마모 정도를 고려하여 산정된 감가상각 반영 중고 시장 가액(이하 "실가")을 기준으로 산정합니다.</p>
<p><strong>③</strong> 모든 손해배상은 회사가 가입한 배상책임보험의 보상 범위 및 보험사의 손해사정 결과에 따라 지급됩니다. 이의가 있는 경우 회원은 제20조에 따라 이의신청을 할 수 있습니다.</p>
<p><strong>④</strong> 회사의 배상 책임은 어떠한 경우에도 해당 유닛에 납부된 보증금의 10배를 초과하지 않습니다.</p>
<p class="bullet">▸ 소중:함(M): 사고당 최대 700,000원</p>
<p class="bullet">▸ 든든:함(L): 사고당 최대 1,200,000원</p>
<p class="bullet">▸ 넉넉:함(LX): 사고당 최대 2,000,000원</p>
<p><strong>⑤</strong> 제4항의 배상 한도를 초과하는 물품(제8조 제1항 제1군 제4호 해당 물품)은 보관이 금지됩니다. 동 금지 물품을 무단으로 보관하여 발생한 손해에 대해 회사는 배상 책임을 지지 않습니다.</p>
<p><strong>⑥</strong> 회원은 물품 반출 시 상태를 즉시 확인해야 하며, 반출 이후 발견된 손해에 대해서는 회사가 책임을 지지 않습니다.</p>
<h3 class="article">제 14 조 (회사의 면책)</h3>
<p>회사는 다음 각 호의 사유로 발생한 손해에 대해서는 배상 책임을 지지 않습니다.</p>
<p><strong>1.</strong> 천재지변, 수해 등 불가항력적인 사유로 인한 손해. 단, 화재의 경우 회사의 귀책 또는 원인 불명으로 발생한 화재에 한하여 회사가 가입한 화재보험의 보상 범위 내에서 배상하며, 회원의 귀책·금지 물품으로 인한 화재는 면책으로 한다.</p>
<p><strong>2.</strong> 물품의 고유한 결함, 자연적 소모, 변질, 부패 또는 쥐·벌레에 의한 피해</p>
<p><strong>3.</strong> 회원의 부주의로 인한 출입 권한(QR코드 등) 유출 또는 관리 소홀로 발생한 사고</p>
<p><strong>4.</strong> 보관 금지 물품(제8조)을 보관하여 발생한 사고 및 이로 인해 발생한 타 회원의 손해</p>
<p><strong>5.</strong> 정부 정책, 법령의 변경 등 회사가 통제할 수 없는 외부 요인에 의한 서비스 중단</p>
<p><strong>6.</strong> 물품의 발효·자연발열·자연발화, 전기기기·장치의 전기적 사고, 파열 또는 폭발</p>
<p><strong>7.</strong> 회원이 계약 유닛 외 공용 공간에 물품을 보관·방치하여 발생한 손해</p>
<p><strong>8.</strong> 전자파·전자장(EMF)으로 인한 물품 손해</p>
<p><strong>9.</strong> 바람·빗물·모래먼지·추위·서리 등 자연환경 유입으로 인한 손해</p>
<p><strong>10.</strong> 시설 설비의 보수·교체·정기점검으로 서비스 이용이 일시 불가한 경우</p>
<p><strong>11.</strong> 제3자의 불법적인 시스템 접속 또는 해킹으로 인한 손해</p>
<p><strong>12.</strong> 회원의 QR코드·출입 권한 유출·공유로 인한 사고</p>
<h2 class="chapter">제 6 장&nbsp;&nbsp;계약 해지 및 물품의 처분</h2>
<h3 class="article">제 15 조 (계약의 해지)</h3>
<p><strong>①</strong> 회원은 언제든지 중도 해지를 요청할 수 있으며, 제12조의 환불 규정에 따라 정산합니다. 단, 제12조 제4항에 따라 환불 불가 조건이 사전 고지된 상품의 경우 해당 고지 내용이 우선 적용됩니다.</p>
<p><strong>②</strong> 회사는 회원이 다음 각 호에 해당할 경우 계약을 해지할 수 있습니다.</p>
<p><strong>1.</strong> 이용료 결제일로부터 30일이 경과하도록 미납이 해소되지 않는 경우</p>
<p><strong>2.</strong> 본 약관의 금지 사항 및 행위 제한 규정을 위반하여 운영에 차질을 주는 경우</p>
<p><strong>3.</strong> 타 회원의 서비스 이용을 방해하거나 위협을 가하는 경우</p>
<p><strong>4.</strong> 제8조의 금지 물품을 보관하는 것이 확인된 경우 (즉시 해지 가능)</p>
<p><strong>5.</strong> 회원이 사망하거나 60일 이상 연락이 두절된 경우</p>
<h3 class="article">제 16 조 (물품의 반출 및 강제 처분)</h3>
<p><strong>①</strong> 계약 기간 만료 또는 계약 해지 즉시 회원의 QR 출입 권한은 자동으로 소멸되며, 회원은 계약 종료일까지 보관 물품을 반출하고 유닛을 원상복구해야 합니다.</p>
<p><strong>②</strong> 계약 종료일 이후에도 물품이 반출되지 않은 경우 회사는 다음 3단계 절차를 이행합니다.</p>
<p><strong>▸ [1단계] 종료일로부터 +7일 이내</strong></p>
<p>카카오 채널(도심창고_함(HAAM)) 또는 문자메시지로 1차 반출 독촉 및 캐비넷 비밀번호 변경 예고 발송</p>
<p><strong>▸ [2단계] 종료일로부터 +21일 이내</strong></p>
<p>처분 예고를 포함한 2차 반출 독촉 발송</p>
<p><strong>▸ [3단계] 종료일로부터 +28일 경과 후</strong></p>
<p>① 물품을 다른 장소로 이전·보관 (이전 비용은 회원 부담)</p>
<p>② 미납 지연 점유료 정산 후 잉여분 회원 반환</p>
<p>③ 물품을 매각·공매·폐기 처분하고 수익을 미납금에 충당, 잔액 반환</p>
<p><strong>③</strong> [캐비넷 비밀번호 변경 — 보안 조치] 회사는 계약 종료 후 회원이 물품을 미반출한 상태에서, 출입 권한을 상실한 해당 회원 또는 제3자가 유닛에 무단 접근하여 미납 지연 점유료 등의 정산 없이 물품을 반출하는 것을 방지하기 위하여, 계약 종료일 익일부터 해당 유닛의 캐비넷 비밀번호를 회사 보안 번호로 변경할 수 있습니다. 이 조치는 캐비넷 내부를 개방·수색·처분하지 않으며 오직 외부 접근 차단을 목적으로 하고, 회원에게 카카오 채널(도심창고_함(HAAM)) 또는 문자메시지로 즉시 통보합니다.</p>
<p><strong>④</strong> [비밀번호 변경 후 물품 접근 절차] 캐비넷 비밀번호가 변경된 이후 회원이 물품 반출을 원하는 경우 다음 절차에 따라 진행합니다.</p>
<p class="step">Step 1. 카카오 채널(도심창고_함(HAAM)) 또는 문자메시지로 반출 의사 통지</p>
<p class="step">Step 2. 회사가 지연 점유료 및 미납금액 확정 후 회원에게 통지</p>
<p class="step">Step 3. 회원이 지정 계좌로 전액 납부</p>
<p class="step">Step 4. 납부 확인 즉시 새 캐비넷 비밀번호 및 임시 QR 접근 권한 부여</p>
<p class="step">Step 5. 회원 반출 완료 후 임시 QR 권한 자동 소멸</p>
<p><strong>⑤</strong> [캐비넷 비밀번호 변경 조치 면책] 회사가 제3항의 보안 조치를 이행하는 과정에서 발생하는 다음 각 호의 손해에 대하여 회사는 책임을 지지 않습니다.</p>
<p><strong>1.</strong> 회원이 캐비넷에 접근하지 못함으로 인해 발생하는 간접 손해 (업무 지장, 배송 지연, 기회 손실 등)</p>
<p><strong>2.</strong> 캐비넷 내 물품의 자연적 노화·변질·습기 손상 (단, 회사가 임의로 캐비넷을 개방하여 발생한 손해는 제외)</p>
<p><strong>3.</strong> 회원이 반출 의사를 표시하지 않아 발생하는 추가 지연 점유료 누적</p>
<p><strong>⑥</strong> 물품 처분 과정에서 발생하는 모든 비용은 보증금에서 우선 공제하며, 부족분은 회원에게 청구합니다.</p>
<p><strong>⑦</strong> 회원은 본 조에 따른 적법한 절차를 거친 회사의 조치에 대하여 손해배상을 청구할 수 없습니다.</p>
<h3 class="article">제 16 조의 2 (이용자의 사망 및 연락 두절)</h3>
<p><strong>①</strong> 회원이 사망한 경우 상속인은 다음 서류를 카카오 채널(도심창고_함(HAAM)) 또는 방문으로 제출하여 이용자 지위를 승계받을 수 있습니다.</p>
<p class="bullet">▸ 가족관계증명서(고인 포함), 사망진단서, 신청인(상속인) 신분증 사본</p>

<p><strong>②</strong> 이용자 지위 승계의 효력은 회사가 서류를 확인·승인한 날부터 발생합니다.</p>

<p><strong>④</strong> 회원이 60일 이상 연락이 두절된 경우, 회사는 알려진 최후 연락처로 사전 통지 후 제16조의 물품 처분 절차를 준용할 수 있습니다.</p>
<h2 class="chapter">제 7 장&nbsp;&nbsp;광고성 정보</h2>

<p><strong>②</strong> 회원은 언제든지 수신을 거절할 수 있으며, 수신 거절 즉시 회사는 광고성 정보 발송을 중단합니다.</p>

<p><strong>③</strong> 소비자기본법에 따라 분쟁이 발생한 경우 한국소비자원에 분쟁조정을 신청할 수 있습니다.</p>
<p><strong>④</strong> 협의로 해결되지 않는 경우 소송이 제기될 경우, 회사의 본점 소재지를 관할하는 법원을 합의 관할 법원으로 합니다.</p>

function switchVersion(ver) {
  const container = document.getElementById('terms-container');
  container.style.animation = 'none';
  container.offsetHeight; // trigger reflow
  container.style.animation = 'fadeIn 0.3s ease';
  container.innerHTML = termsData[ver];

  document.querySelectorAll('.version-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.version === ver);
  });

  // Update URL hash without scroll
  history.replaceState(null, '', '#' + ver);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
